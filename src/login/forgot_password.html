<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة الحساب | الكنان تك</title>

    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined" rel="stylesheet">
</head>
<body>

    <div class="overlay">
        <div class="forgot-card animate-in">

            <div class="forms-section">
                <div class="max-w-md mx-auto w-full">
                    <div class="form-header">
                        <h1>نسيت كلمة المرور؟</h1>
                        <p>لا تقلق، اختر طريقة الاستعادة المناسبة وسنساعدك في العودة لحسابك.</p>
                    </div>

                    <div class="login-options">
                        <button type="button" class="opt-btn active" onclick="switchForgotMethod('email')">بالبريد
                            الإلكتروني</button>
                        <button type="button" class="opt-btn" onclick="switchForgotMethod('phone')">برقم الهاتف</button>
                    </div>

                    <form>
                        <div id="emailForgotGroup" class="input-group">
                            <label>البريد الإلكتروني المسجل</label>
                            <div class="input-wrapper">
                                <span class="material-symbols-outlined prefix-icon">mail</span>
                                <input type="email" placeholder="example@tech.com" required>
                            </div>
                        </div>

                        <div id="phoneForgotGroup" class="input-group hidden">
                            <label>رقم الهاتف المسجل</label>
                            <div class="tel-input">
                                <span class="code">+967</span>
                                <input type="tel" placeholder="777000000" maxlength="9">
                            </div>
                        </div>

                        <button type="submit" class="main-btn">إرسال رمز التحقق</button>
                    </form>

                    <div class="switch-text">
                        <a href="login.html" class="inline-flex items-center gap-2 text-primary font-semibold"
                            style="text-decoration: none;color: #9f4c03;">
                            <span class="material-symbols-outlined"
                                style="vertical-align: middle; font-size: 18px; color: #9f4c03;">arrow_forward</span>
                            العودة لتسجيل الدخول
                        </a>
                    </div>
                </div>
            </div>
