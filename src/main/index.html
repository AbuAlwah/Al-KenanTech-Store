<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>متجر الكنان تك - للكمبيوتر</title>

  <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <link rel="stylesheet"
    href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <link rel="stylesheet" href="logo.css">
  <link rel="stylesheet" href="search.css">
  <link rel="stylesheet" href="user-buttons.css">

  <style>
    /* --- 1. الأساسيات (Global Styles) --- */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Tajawal', sans-serif;
      background-color: #f8f9fa;
      color: #333;
      line-height: 1.6;
    }
  </style>
</head>

<body>
  <div class="top-bar"></div>

  <header class="main-header">
    <div class="container header-flex">
      <div class="logo" dir="ltr">
        <a href="#" class="brand-logo">
          <span class="al">AL</span>
          <span class="k-wrap">
            <span class="k">K</span>
            <span class="line"></span>
          </span>
          <span class="enan">ENAN</span>
          <span class="tech">TECH</span>
        </a>
      </div>
    </div>
    <form action="#" method="get"></form>
    <div class="search-container">
      <select dir="ltr">
        <option>جميع الفئات</option>
        <option>كروت الشاشة</option>
        <option>معالجات</option>
        <option>إكسسوارات</option>
        <option>لابتوبات</option>
      </select>
      <input type="text" placeholder="ابحث عن لابتوب، كرت شاشة...">
      <button class="search-btn">
        <i class="fas fa-search"></i>
      </button>
    </div>
    </form>
    <div class="user-actions">
      <div class="action-item">
        <i class="far fa-user"></i>
        <span>حسابي</span>
      </div>
      <div class="action-item">
        <i class="far fa-heart"></i>
        <span>المفضلة</span>
      </div>
      <div class="action-item">
        <i class="fas fa-shopping-cart"></i>
        <span>0.00 دولار</span>
      </div>
    </div>
    </div>
  </header>

   <nav class="main-nav">
    <div class="container nav-flex">
      <a href="#" class="cat-btn">
        <i class="fas fa-list-ul"></i>
        تسوق حسب الفئة
      </a>
      <ul class="nav-links">
        <li><a href="#">جميع الفئات</a></li>
        <li><a href="#">كروت الشاشة</a></li>
        <li><a href="#">إكسسوارات</a></li>
        <li><a href="#">لابتوبات</a></li>
      </ul>
    </div>
  </nav>
