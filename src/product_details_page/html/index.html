<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Asus ROG Strix G15 - الكنان تك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;800&family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
</head>
<body>

<header class="main-header">
    <div class="container nav-flex">
        <div class="logo">AL <span>KENAN</span> TECH</div>
        <div class="user-tools">
            <span class="material-symbols-outlined icon-btn">person</span>
            <span class="material-symbols-outlined icon-btn">shopping_cart</span>
        </div>
    </div>
</header>

<main class="container">
    <nav class="breadcrumb">
        <span>الرئيسية</span> / <span>لابتوبات</span> / <span class="active">لابتوبات جيمنج</span>
    </nav>

    <section class="product-hero">
        <div class="product-visuals">
            <div class="main-image-wrapper">
                <div class="badge-new">جديد</div>
                <img id="main-img" src="src/img/categories_section_laptop.jpg" alt="Laptop">
            </div>
            <div class="thumb-grid">
                <div class="thumb active"><img src="src/img/categories_section_laptop.jpg" onclick="updateImg(this)"></div>
                <div class="thumb"><img src="src/img/categories_section_graphicsCard.jpg" onclick="updateImg(this)"></div>
                <div class="thumb"><img src="src/img/categories_section_mouse.jpg" onclick="updateImg(this)"></div>
                <div class="thumb"><img src="src/img/categories_section_processor.webp" onclick="updateImg(this)"></div>
            </div>
        </div>

                <div class="product-info">
            <p class="brand-label">ASUS ROG SERIES</p>
            <h1>Asus ROG Strix G15 Gaming Laptop</h1>
            
            <div class="rating-row">
                <div class="stars yellow">
                    <span class="material-symbols-outlined fill">star</span>
                    <span class="material-symbols-outlined fill">star</span>
                    <span class="material-symbols-outlined fill">star</span>
                    <span class="material-symbols-outlined fill">star</span>
                    <span class="material-symbols-outlined">star_half</span>
                </div>
                <span class="count">(124 تقييم)</span>
            </div>

            <div class="price">4,999 ر.س</div>

            <ul class="short-specs">
                <li><span class="bullet"></span> المعالج: AMD Ryzen 9 5900HX</li>
                <li><span class="bullet"></span> الذاكرة: 16GB DDR5 4800MHz</li>
                <li><span class="bullet"></span> الجرافيكس: NVIDIA RTX 3060 6GB</li>
            </ul>

            <div class="action-area">
                <div class="qty-box">
                    <button onclick="changeQty(-1)">-</button>
                    <span id="qty-val">1</span>
                    <button onclick="changeQty(1)">+</button>
                </div>
                <button class="btn-main">
                    <span class="material-symbols-outlined">shopping_bag</span>
                    إضافة للسلة
                </button>
            </div>
        </div>
    </section>
