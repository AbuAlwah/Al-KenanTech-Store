<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Kinan Tech | التحقق من الرمز</title>
    <link rel="stylesheet" href="../css/auth_global.css">
    <link rel="stylesheet" href="../css/auth_layout.css">
    <link rel="stylesheet" href="../css/auth_buttons.css">
    <link rel="stylesheet" href="../css/auth-elements.css">
    <link rel="stylesheet" href="../css/verify_code_global.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
</head>
<body>

<main>
    <div class="blur-bg blur-1"></div>
    <div class="blur-bg blur-2"></div>

    <section class="otp-card">
        <div class="icon-circle">
            <span id="mainIcon" class="material-symbols-outlined" style="font-size: 50px; color:#f48024">shield_person</span>
        </div>
        <h1 id="pageTitle" style="margin-bottom: 10px; font-weight: 800;">التحقق من الرمز</h1>
        <p id="pageDesc" style="color: #666; margin-bottom: 30px;">أدخل الرمز المكون من 6 أرقام المرسل إليك</p>

        <form id="otpForm">
            <div class="otp-group">
                <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
            </div>
            <button type="submit" class="btn-confirm">تأكيد الرمز</button>
        </form>
        
        <p style="margin-top: 25px; font-size: 0.9rem; color: #555;">
            لم تستلم الرمز بعد؟ <br>
            <a href="#" style="color: #f48024; font-weight: 700; text-decoration: none;">إعادة إرسال الرمز</a>
        </p>
    </section>
</main>

<script src="../js/verify_code.js"></script>
</body>
</html>
