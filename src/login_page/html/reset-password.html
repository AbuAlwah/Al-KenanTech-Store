<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة مرور جديدة | الكنان تك</title>
    <link rel="stylesheet" href="../css/auth_global.css">
    <link rel="stylesheet" href="../css/auth_layout.css">
    <link rel="stylesheet" href="../css/auth_buttons.css">
    <link rel="stylesheet" href="../css/auth_elements.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body class="verify-page">

<main class="auth-main-content">
    <div class="blur-circle blur-1"></div>
    <div class="blur-circle blur-2"></div>

    <section class="otp-card">
        <div class="icon-circle">
            <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">lock_reset</span>
        </div>
        <h1>تعيين كلمة مرور جديدة</h1>
        <p class="subtitle">يرجى اختيار كلمة مرور قوية وسهلة التذكر</p>

        <form id="resetPasswordForm">
            <div class="input-group">
                <label>كلمة المرور الجديدة</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined prefix-icon">lock</span>
                    <input type="password" id="newPassword" placeholder="••••••••" required>
                    <span class="material-symbols-outlined toggle-password">visibility</span>
                </div>
            </div>

            <div class="input-group">
                <label>تأكيد كلمة المرور</label>
                <div class="input-wrapper">
                    <span class="material-symbols-outlined prefix-icon">lock</span>
                    <input type="password" id="confirmPassword" placeholder="••••••••" required>
                    <span class="material-symbols-outlined toggle-password">visibility</span>
                </div>
            </div>

            <button type="submit" class="btn-primary-gradient">تحديث كلمة المرور</button>
        </form>

        <div class="back-to-login">
            <a href="login.html" class="resend-link">
                العودة لتسجيل الدخول
                <span class="material-symbols-outlined">arrow_back</span>
            </a>
        </div>
    </section>
</main>

<script src="../js/reset-password.js"></script>
</body>
</html>
