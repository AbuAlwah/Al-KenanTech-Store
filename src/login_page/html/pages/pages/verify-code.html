<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Al-Kinan Tech | التحقق من الرمز</title>
    <link rel="stylesheet" href="../css/auth_global.css">
    <link rel="stylesheet" href="../css/auth_layout.css">
    <link rel="stylesheet" href="../css/auth_buttons.css">
    <link rel="stylesheet" href="../css/auth_elements.css">
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
</head>
<body class="verify-page">

<main class="auth-main-content">
    <div class="blur-circle blur-1"></div>
    <div class="blur-circle blur-2"></div>

    <section class="otp-card">
        <div class="icon-circle">
            <span id="mainIcon" class="material-symbols-outlined">shield_person</span>
        </div>
        <h1 id="pageTitle">التحقق من الرمز</h1>
        <p id="pageDesc">أدخل الرمز المكون من 6 أرقام المرسل إليك</p>

        <form id="otpForm">
            <div class="otp-group">
                <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
                <input class="otp-input" maxlength="1" type="text" inputmode="numeric">
            </div>
            <button type="submit" class="btn-primary-gradient">تأكيد الرمز</button>
        </form>
        
        <div class="resend-container">
            <p>لم تستلم الرمز بعد؟</p>
            <a href="#" class="resend-link">إعادة إرسال الرمز</a>
        </div>
    </section>
</main>

<script src="../js/verify-code.js"></script>
</body>
</html>
