<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة مرور جديدة | الكنان تك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    <link rel="stylesheet" href="../css/reset_password.css">
</head>
<body>

    <main class="main-content">
        <section class="reset-card">
            <div class="icon-box">
                <span class="material-symbols-outlined" style="font-size: 40px;">lock_reset</span>
            </div>
            <h2>تعيين كلمة مرور جديدة</h2>
            <p style="color: #666; margin-bottom: 30px;">اختر كلمة مرور قوية لموقعك</p>

            <form id="resetForm">
                <div class="input-group">
                    <label>كلمة المرور الجديدة</label>
                    <div class="field-wrapper">
                        <span class="material-symbols-outlined icon-right">lock</span>
                        <input type="password" id="newPass" required>
                        <span class="material-symbols-outlined icon-left" onclick="togglePass('newPass', this)">visibility</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>تأكيد كلمة المرور</label>
                    <div class="field-wrapper">
                        <span class="material-symbols-outlined icon-right">lock</span>
                        <input type="password" id="confirmPass" required>
                        <span class="material-symbols-outlined icon-left" onclick="togglePass('confirmPass', this)">visibility</span>
                    </div>
                </div>

                <button type="submit" class="submit-btn">تحديث كلمة المرور</button>
            </form>
        </section>
    </main>

    <script src="../js/reset_password.js"></script>
</body>
</html>
