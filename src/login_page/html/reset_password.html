<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تعيين كلمة مرور جديدة | الكنان تك</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
    
    <style>
        /* التنسيقات الأساسية فقط لهذه الصفحة */
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #fff8f5;
            margin: 0;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        /* البطاقة المركزية */
        .reset-card {
            background: white;
            width: 100%;
            max-width: 420px;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.05);
            text-align: center;
        }

        .icon-box {
            width: 80px; height: 80px;
            background: #fff1ea;
            border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            margin: 0 auto 20px;
            color: #f48024;
        }

        /* الحقول */
        .input-group { margin-bottom: 20px; text-align: right; }
        .input-group label { display: block; margin-bottom: 8px; font-weight: 600; color: #444; }
        
        .field-wrapper { position: relative; display: flex; align-items: center; }
        
        .field-wrapper input {
            width: 100%;
            padding: 14px 45px;
            border: 1px solid #ddd;
            border-radius: 12px;
            font-size: 1rem;
            background: #fafafa;
        }

        .field-wrapper .icon-right { position: absolute; right: 15px; color: #f48024; }
        .field-wrapper .icon-left { position: absolute; left: 15px; cursor: pointer; color: #999; }

        /* الزر */
        .submit-btn {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            background: linear-gradient(135deg, #f48024, #974800);
            color: white;
            font-weight: 700;
            cursor: pointer;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>

    <main class="main-content">
        <section class="reset-card">
            <div class="icon-box">
                <span class="material-symbols-outlined" style="font-size: 40px;">lock_reset</span>
            </div>
            <h2>تعيين كلمة مرور جديدة</h2>
            <p style="color: #666; margin-bottom: 30px;">اختر كلمة مرور قوية لموقعك</p>

            <form id="resetForm">
                <div class="input-group">
                    <label>كلمة المرور الجديدة</label>
                    <div class="field-wrapper">
                        <span class="material-symbols-outlined icon-right">lock</span>
                        <input type="password" id="newPass" required>
                        <span class="material-symbols-outlined icon-left" onclick="togglePass('newPass')">visibility</span>
                    </div>
                </div>

                <div class="input-group">
                    <label>تأكيد كلمة المرور</label>
                    <div class="field-wrapper">
                        <span class="material-symbols-outlined icon-right">lock</span>
                        <input type="password" id="confirmPass" required>
                        <span class="material-symbols-outlined icon-left" onclick="togglePass('confirmPass')">visibility</span>
                    </div>
                </div>

                <button type="submit" class="submit-btn">تحديث كلمة المرور</button>
            </form>
        </section>
    </main>

    <script>
        function togglePass(id) {
            const input = document.getElementById(id);
            input.type = input.type === 'password' ? 'text' : 'password';
        }

        document.getElementById('resetForm').onsubmit = (e) => {
            e.preventDefault();
            const p1 = document.getElementById('newPass').value;
            const p2 = document.getElementById('confirmPass').value;
            if(p1 !== p2) return alert("كلمتا المرور غير متطابقتين!");
            alert("تم التغيير بنجاح!");
            window.location.href = 'login.html';
        }
    </script>
</body>
</html>
